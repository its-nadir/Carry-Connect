<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carry Connect</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-left">
        <i
          class="fa-regular fa-globe"
          style="color: #0077ff; font-size: 1.6rem"
        ></i>
        <a href="index.html" class="logo">CarryConnect</a>
      </div>

      <div class="navbar-center">
        <a href="index.html">Home</a>
        <a href="find-carrier.html">Find a Carrier</a>
        <a href="add-trip.html">Add a Trip</a>
      </div>

      <div class="navbar-right">
        <a href="#" class="icon"><i class="fa-regular fa-bell"></i></a>
        <a href="#" class="icon"><i class="fa-regular fa-comments"></i></a>
        <a href="#" class="icon"><i class="fa-regular fa-user"></i></a>
        <button class="add-trip-btn">Add Trip</button>
      </div>
    </nav>

    <section class="main">
      <div class="main-content">
        <div class="text-content">
          <h1>Send Packages Globally<br />with Trusted Travelers</h1>
          <p>
            Connect with travelers heading to your destination and send your
            packages safely and affordably. Or earn extra by delivering packages
            on your trip.
          </p>
          <div class="buttons">
            <button class="primary-btn">
              <i class="fa-solid fa-box-open"></i> Find a Carrier
            </button>
            <button class="secondary-btn">
              <i class="fa-solid fa-plane"></i> Add Your Trip
            </button>
          </div>
        </div>

        <div class="image-content">
          <img
            src="https://images.unsplash.com/photo-1522199710521-72d69614c702?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&q=80&w=1172"
            alt="Travel bag"
          />
        </div>
      </div>

      <div class="search-box">
        <input
          type="text"
          placeholder="From (City or Country)"
          class="input-field"
        />
        <input
          type="text"
          placeholder="To (City or Country)"
          class="input-field"
        />
        <input type="date" class="input-field" />

        <select class="input-field">
          <option value="">Select Size</option>
          <option>Small</option>
          <option>Medium</option>
          <option>Large</option>
        </select>

        <button class="find-btn">Find Carriers</button>
      </div>
    </section>

    <footer></footer>

    <script src="app.js"></script>
  </body>
</html>

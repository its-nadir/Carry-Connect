<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carry Connect</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #4f46e5, #3b82f6);
        color: #fff;
        overflow: hidden;
      }

      .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        animation: fadeIn 1s ease forwards;
        width: 300px;
      }

      h1 {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      p {
        font-size: 18px;
        margin-top: 10px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .loading {
        font-size: 16px;
        opacity: 0.8;
        animation: pulse 1.2s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Testing, ok?</h1>
      <p id="message" class="loading">Loading...</p>
    </div>

    <script type="module">
      // Import Firebase SDKs
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
      import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

      // Your Firebase config
      const firebaseConfig = {
        apiKey: "AIzaSyBlYdXduw0F2PeqSIitcX038Ct8nCWI4rs",
        authDomain: "carry-connect-g-1d438.firebaseapp.com",
        projectId: "carry-connect-g-1d438",
        storageBucket: "carry-connect-g-1d438.appspot.com",
        messagingSenderId: "678996484347",
        appId: "1:678996484347:web:28f6039cc9b61030a6905e"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Fetch Firestore data
      async function loadMessage() {
        const messageBox = document.getElementById("message");
        try {
          const ref = doc(db, "app", "message");
          const snap = await getDoc(ref);
          if (snap.exists()) {
            messageBox.classList.remove("loading");
            messageBox.innerText = snap.data().text;
          } else {
            messageBox.innerText = "No message found";
          }
        } catch (error) {
          messageBox.innerText = "Error: " + error.message;
        }
      }

      loadMessage();
    </script>
  </body>
</html>
